name: Deploy
on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: 18
      - run: npm ci
      - run: npm run build
        env:
          VITE_AZURE_CLIENT_ID: e9b090d5-e7a1-43c2-abe3-761a64c828f9
          VITE_AZURE_TENANT_ID: 59114aa8-a5cf-4ff9-9edd-affc40d640a9
          VITE_DATAVERSE_ORG: richcogroup
          VITE_OPENWEATHER_KEY: fb0a84cc155d4e887a75225ed1c43542
          VITE_ANTHROPIC_API_KEY: ${{ secrets.VITE_ANTHROPIC_API_KEY }}
          VITE_SUPABASE_FUNCTION_URL: ${{ secrets.VITE_SUPABASE_FUNCTION_URL }}
      - uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          action: upload
          app_location: dist
